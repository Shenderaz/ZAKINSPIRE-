<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Zakinspired — daily inspirational quotes and Bible verses." />
  <meta name="theme-color" content="#0f172a" />
  <title>Zakinspired</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles/main.css" />

  <script type="importmap">
  {
    "imports": {
      "firebase/app":       "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",
      "firebase/auth":      "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js"
    }
  }
  </script>
</head>
<body>
  <header class="site-header">
    <h1 class="site-title">Zakinspired</h1>
    <nav class="site-nav" aria-label="Primary">
      <button id="nav-quote" type="button" aria-pressed="true">Quote</button>
      <button id="nav-verse" type="button" aria-pressed="false">Verse</button>
      <button id="nav-favorites" type="button" aria-pressed="false">Favorites</button>
      <button id="theme-toggle" type="button" aria-label="Toggle dark mode">Theme</button>
      <span id="auth-user" class="auth-user" hidden></span>
      <button id="auth-signin" type="button">Sign in</button>
      <button id="auth-signout" type="button" hidden>Sign out</button>
    </nav>
  </header>

  <main id="app" class="app" aria-live="polite">
    <section id="quote-view" class="view" aria-labelledby="quote-heading">
      <h2 id="quote-heading" class="visually-hidden" tabindex="-1">Daily quote</h2>
      <article id="quote-card" class="card card--quote"></article>
      <div class="actions">
        <button id="new-quote" type="button">New quote</button>
        <button id="save-quote" class="like-btn" type="button" aria-pressed="false">Like</button>
      </div>
    </section>

    <section id="verse-view" class="view" hidden aria-labelledby="verse-heading">
      <h2 id="verse-heading" class="visually-hidden" tabindex="-1">Bible verse</h2>
      <article id="verse-card" class="card card--verse"></article>
      <div class="actions">
        <button id="new-verse" type="button">New verse</button>
        <button id="save-verse" class="like-btn" type="button" aria-pressed="false">Like</button>
      </div>
    </section>

    <section id="favorites-view" class="view" hidden aria-labelledby="favorites-heading">
      <h2 id="favorites-heading" tabindex="-1">Favorites</h2>
      <ul id="favorites-list" class="favorites-list"></ul>
    </section>
  </main>

  <div id="auth-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="auth-title" hidden>
    <div class="modal__panel">
      <button id="auth-close" class="modal__close" type="button" aria-label="Close">&times;</button>
      <h2 id="auth-title" class="modal__title">Sign in</h2>
      <p class="modal__subtitle">Save your favorite quotes and verses across devices.</p>

      <button id="auth-google" class="btn-google" type="button">
        <span class="btn-google__icon" aria-hidden="true">G</span>
        <span>Continue with Google</span>
      </button>

      <div class="modal__divider"><span>or</span></div>

      <form id="auth-form" class="auth-form" novalidate>
        <label class="auth-field">
          <span>Email</span>
          <input id="auth-email" type="email" autocomplete="email" required />
        </label>
        <label class="auth-field">
          <span>Password</span>
          <input id="auth-password" type="password" autocomplete="current-password" minlength="6" required />
        </label>
        <p id="auth-error" class="auth-error" role="alert"></p>
        <button id="auth-submit" class="btn-primary" type="submit">Sign in</button>
      </form>

      <p class="auth-toggle">
        <span id="auth-toggle-text">Don't have an account?</span>
        <button id="auth-toggle" type="button" class="auth-toggle__btn">Create one</button>
      </p>
    </div>
  </div>

  <footer class="site-footer">
    <small>Quotes via dummyjson.com · Verses via bible-api.com</small>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
